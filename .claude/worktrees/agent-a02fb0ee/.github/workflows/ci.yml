name: BugSmasher Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret hygiene scan
        run: |
          ! grep -R -n -E "service_role|sbp_|eyJhbGci|faloknbaathdkmaeodxt" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=coverage --exclude=.env --exclude=ci.yml .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test -- --run

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev
